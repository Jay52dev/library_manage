    <section class="add-book-section">
        <div class="container">
            <h2 class="text-center">Add a New Book</h2>
            <form action="add_book.php" method="POST" enctype="multipart/form-data" class="book-form">
                <div class="mb-3">
                    <label for="bookTitle" class="form-label">Book Title</label>
                    <input type="text" class="form-control" id="bookTitle" name="title" required>
                </div>

                <div class="mb-3">
                    <label for="author" class="form-label">Author</label>
                    <input type="text" class="form-control" id="author" name="author" required>
                </div>

                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select Category</option>
                        <option value="Biography">Biography</option>
                        <option value="Science">Science</option>
                        <option value="Novel">Novel</option>
                        <option value="History">History</option>
                        <option value="story">story</option>
                        <option value="Kavya">Kavya</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="coverImage" class="form-label">Book Cover Image</label>
                    <input type="file" class="form-control" id="coverImage" name="cover_image" accept="image/*" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Add Book</button>
            </form>
        </div>
    </section>
